<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Maker AI - Icon Selection</title>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        h1 {
            color: #1e293b;
            margin-bottom: 40px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 30px;
        }

        .icon-card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            transition: transform 0.2s;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .icon-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: #8B5CF6;
        }

        .label {
            font-size: 14px;
            font-weight: 600;
            color: #64748b;
        }

        /* The FAB Style from Extension */
        .search-fab {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8B5CF6 0%, #EC4899 100%);
            box-shadow: 0 4px 15px rgba(236, 72, 153, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .search-fab svg {
            width: 28px;
            height: 28px;
            stroke-width: 2.5;
        }
    </style>
</head>

<body>

    <h1>Choose Your Icon</h1>

    <div class="grid">
        <!-- Option 1: Sparkles -->
        <div class="icon-card">
            <div class="search-fab">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path
                        d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z">
                    </path>
                </svg>
            </div>
            <span class="label">Star / Sparkle</span>
        </div>

        <!-- Option 2: Robot -->
        <div class="icon-card">
            <div class="search-fab">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"
                    stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="10" rx="2"></rect>
                    <circle cx="12" cy="5" r="2"></circle>
                    <path d="M12 7v4"></path>
                    <line x1="8" y1="16" x2="8" y2="16"></line>
                    <line x1="16" y1="16" x2="16" y2="16"></line>
                </svg>
            </div>
            <span class="label">Robot / Bot</span>
        </div>

        <!-- Option 3: Rocket -->
        <div class="icon-card">
            <div class="search-fab">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z">
                    </path>
                    <path d="M12 15l-3-3a22 22 0 0 1 2-11 22 22 0 0 1 11 2 22 22 0 0 1-2 11z"></path>
                </svg>
            </div>
            <span class="label">Rocket / Speed</span>
        </div>

        <!-- Option 4: Briefcase -->
        <div class="icon-card">
            <div class="search-fab">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"
                    stroke-linejoin="round">
                    <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
                    <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
                </svg>
            </div>
            <span class="label">Briefcase</span>
        </div>

        <!-- Option 5: Bolt -->
        <div class="icon-card">
            <div class="search-fab">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"
                    stroke-linejoin="round">
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                </svg>
            </div>
            <span class="label">Bolt / Fast</span>
        </div>
    </div>

</body>

</html>
